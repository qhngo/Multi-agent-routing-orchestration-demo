<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Agentic System</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="auth-body">
  <main class="auth-shell">
    <section class="auth-card">
      <h1>Agentic System</h1>
      <p class="subtle">Sign in to open the chat workspace.</p>
      <form id="login-form" class="auth-form">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
        <div class="button-row">
          <button type="submit">Log In</button>
          <button id="create-user-button" class="secondary-button" type="button">Create User</button>
        </div>
      </form>
      <p id="login-error" class="error-text" aria-live="polite"></p>
    </section>
  </main>
  <script src="/static/login.js"></script>
</body>
</html>
